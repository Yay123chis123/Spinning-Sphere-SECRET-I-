<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glowing 3D Sphere</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #0a0a0f;
            font-family: 'Segoe UI', sans-serif;
        }
        
        canvas {
            display: block;
        }
        
        .info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            pointer-events: none;
        }
        
        .secret-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff0040;
            font-size: 48px;
            font-weight: bold;
            letter-spacing: 4px;
            text-transform: uppercase;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
            text-shadow: 0 0 20px #ff0040, 0 0 40px #ff0040, 0 0 60px #ff0040;
            font-family: 'Courier New', monospace;
        }
        
        .secret-message.visible {
            opacity: 1;
        }
        
        .secret-message-behind {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #00ff88;
            font-size: 48px;
            font-weight: bold;
            letter-spacing: 4px;
            text-transform: uppercase;
            pointer-events: none;
            opacity: 0;
            transition: opacity 2s ease-in-out;
            text-shadow: 0 0 30px #00ff88, 0 0 60px #00ff88, 0 0 90px #00ff88;
            font-family: 'Courier New', monospace;
        }
        
        .secret-message-behind.visible {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="info">Move mouse to interact</div>
    <div class="secret-message" id="secretMessage">IM COMING FOR YOU!!!</div>
    <div class="secret-message-behind" id="secretMessageBehind">IM BEHIND YOU!!!</div>
    
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    
    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        
        // Scene setup
        const scene = new THREE.Scene();
        
        // Camera
        const camera = new THREE.PerspectiveCamera(
            75,
            window.innerWidth / window.innerHeight,
            0.1,
            1000
        );
        camera.position.z = 3;
        
        // Renderer
        const renderer = new THREE.WebGLRenderer({ 
            antialias: true,
            alpha: true 
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ReinhardToneMapping;
        renderer.toneMappingExposure = 1.5;
        document.body.appendChild(renderer.domElement);
        
        // Post-processing for glow
        const composer = new EffectComposer(renderer);
        const renderPass = new RenderPass(scene, camera);
        composer.addPass(renderPass);
        
        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            1.5,  // strength
            0.4,  // radius
            0.85  // threshold
        );
        composer.addPass(bloomPass);
        
        // Create glowing sphere
        const sphereGeometry = new THREE.SphereGeometry(1, 64, 64);
        
        // Custom shader material for animated glow
        const sphereMaterial = new THREE.ShaderMaterial({
            transparent: true,
            uniforms: {
                time: { value: 0 },
                mouseInfluence: { value: new THREE.Vector2(0, 0) },
                color1: { value: new THREE.Color(0x00ffff) },
                color2: { value: new THREE.Color(0xff00ff) },
                color3: { value: new THREE.Color(0x4400ff) },
                sphereOpacity: { value: 1.0 }
            },
            vertexShader: `
                varying vec3 vNormal;
                varying vec3 vPosition;
                varying vec2 vUv;
                
                void main() {
                    vNormal = normalize(normalMatrix * normal);
                    vPosition = position;
                    vUv = uv;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform float time;
                uniform vec2 mouseInfluence;
                uniform vec3 color1;
                uniform vec3 color2;
                uniform vec3 color3;
                uniform float sphereOpacity;
                
                varying vec3 vNormal;
                varying vec3 vPosition;
                varying vec2 vUv;
                
                void main() {
                    // Fresnel effect for edge glow
                    vec3 viewDirection = normalize(cameraPosition - vPosition);
                    float fresnel = pow(1.0 - abs(dot(vNormal, viewDirection)), 2.0);
                    
                    // Animated color based on position and time
                    float wave = sin(vPosition.y * 3.0 + time * 2.0) * 0.5 + 0.5;
                    float wave2 = sin(vPosition.x * 2.0 + time * 1.5) * 0.5 + 0.5;
                    
                    vec3 baseColor = mix(color1, color2, wave);
                    baseColor = mix(baseColor, color3, wave2 * 0.5);
                    
                    // Add mouse influence to color
                    float mouseEffect = length(mouseInfluence) * 0.3;
                    baseColor = mix(baseColor, vec3(1.0, 0.5, 0.0), mouseEffect);
                    
                    // Combine with fresnel
                    vec3 finalColor = baseColor * (0.6 + fresnel * 1.5);
                    finalColor += baseColor * 0.3; // Ambient
                    
                    gl_FragColor = vec4(finalColor, sphereOpacity);
                }
            `,
            side: THREE.DoubleSide
        });
        
        const sphere = new THREE.Mesh(sphereGeometry, sphereMaterial);
        scene.add(sphere);
        
        // Add inner core sphere
        const coreGeometry = new THREE.SphereGeometry(0.5, 32, 32);
        const coreMaterial = new THREE.MeshBasicMaterial({
            color: 0x00ffff,
            transparent: true,
            opacity: 0.8
        });
        const core = new THREE.Mesh(coreGeometry, coreMaterial);
        scene.add(core);
        
        // Add particles around sphere
        const particlesGeometry = new THREE.BufferGeometry();
        const particlesCount = 500;
        const posArray = new Float32Array(particlesCount * 3);
        
        for (let i = 0; i < particlesCount * 3; i += 3) {
            const radius = 1.5 + Math.random() * 1.5;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            
            posArray[i] = radius * Math.sin(phi) * Math.cos(theta);
            posArray[i + 1] = radius * Math.sin(phi) * Math.sin(theta);
            posArray[i + 2] = radius * Math.cos(phi);
        }
        
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        
        const particlesMaterial = new THREE.PointsMaterial({
            size: 0.02,
            color: 0x00ffff,
            transparent: true,
            opacity: 0.6,
            blending: THREE.AdditiveBlending
        });
        
        const particles = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particles);
        
        // Mouse tracking
        const mouse = { x: 0, y: 0, targetX: 0, targetY: 0 };
        
        // Secret message tracking
        let leftSideTime = 0;
        let secretRevealed = false;
        let secretPhase = 0; // 0: not revealed, 1: first message, 2: fading, 3: second message
        let fadeProgress = 0;
        const secretMessage = document.getElementById('secretMessage');
        const secretMessageBehind = document.getElementById('secretMessageBehind');
        
        document.addEventListener('mousemove', (event) => {
            mouse.targetX = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.targetY = -(event.clientY / window.innerHeight) * 2 + 1;
            
            // Reset everything if mouse moves away from left
            if (mouse.targetX > -0.3 && secretPhase < 3) {
                leftSideTime = 0;
                secretRevealed = false;
                secretPhase = 0;
                fadeProgress = 0;
                secretMessage.classList.remove('visible');
                secretMessageBehind.classList.remove('visible');
                // Reset opacities
                sphereMaterial.uniforms.sphereOpacity.value = 1;
                coreMaterial.opacity = 0.8;
                particlesMaterial.opacity = 0.6;
                renderer.setClearColor(0x0a0a0f, 1);
            }
        });
        
        // Touch support
        document.addEventListener('touchmove', (event) => {
            if (event.touches.length > 0) {
                mouse.targetX = (event.touches[0].clientX / window.innerWidth) * 2 - 1;
                mouse.targetY = -(event.touches[0].clientY / window.innerHeight) * 2 + 1;
            }
        });
        
        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // Animation loop
        const clock = new THREE.Clock();
        
        function animate() {
            requestAnimationFrame(animate);
            
            const elapsedTime = clock.getElapsedTime();
            
            // Smooth mouse interpolation
            mouse.x += (mouse.targetX - mouse.x) * 0.05;
            mouse.y += (mouse.targetY - mouse.y) * 0.05;
            
            // Secret: track time on left side (60fps approximation)
            if (mouse.x < -0.3 && secretPhase === 0) {
                leftSideTime += 0.0167;
                if (leftSideTime >= 3) {
                    secretPhase = 1;
                    secretMessage.classList.add('visible');
                    // Start fade after showing first message
                    setTimeout(() => {
                        secretPhase = 2;
                        secretMessage.classList.remove('visible');
                    }, 2000);
                    // Show second message after fade completes
                    setTimeout(() => {
                        secretPhase = 3;
                        secretMessageBehind.classList.add('visible');
                    }, 4500);
                }
            }
            
            // Handle fading of 3D objects
            if (secretPhase === 2) {
                fadeProgress += 0.01;
                const fadeFactor = Math.max(0, 1 - fadeProgress);
                sphereMaterial.uniforms.sphereOpacity.value = fadeFactor;
                coreMaterial.opacity = 0.8 * fadeFactor;
                particlesMaterial.opacity = 0.6 * fadeFactor;
                // Fade to black background
                const blackLevel = Math.floor(fadeFactor * 10);
                renderer.setClearColor(blackLevel, 1);
            }
            
            // Update shader uniforms
            sphereMaterial.uniforms.time.value = elapsedTime;
            sphereMaterial.uniforms.mouseInfluence.value.set(mouse.x, mouse.y);
            
            // Rotate sphere based on mouse position
            sphere.rotation.y += 0.005 + mouse.x * 0.02;
            sphere.rotation.x += 0.003 + mouse.y * 0.02;
            
            // Inner core counter-rotation with pulse
            core.rotation.y -= 0.01;
            core.rotation.z += 0.008;
            const pulse = Math.sin(elapsedTime * 3) * 0.1 + 1;
            core.scale.setScalar(pulse);
            
            // Rotate particles
            particles.rotation.y += 0.001;
            particles.rotation.x += 0.0005;
            
            // Mouse influence on particles
            particles.rotation.y += mouse.x * 0.002;
            particles.rotation.x += mouse.y * 0.002;
            
            // Camera subtle movement
            camera.position.x += (mouse.x * 0.3 - camera.position.x) * 0.02;
            camera.position.y += (mouse.y * 0.3 - camera.position.y) * 0.02;
            camera.lookAt(scene.position);
            
            // Render with post-processing
            composer.render();
        }
        
        animate();
    </script>
</body>
</html>
